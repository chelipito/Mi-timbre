<style>
  :root{
    --void: #0a0e14;
    --panel: #10161f;
    --panel-edge: #1c2530;
    --cyan: #4dd8e8;
    --cyan-dim: rgba(77,216,232,0.28);
    --amber: #e8a23d;
    --amber-dim: rgba(232,162,61,0.25);
    --text: #d9e4ea;
    --dim: #5c6b78;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{height:100%; margin:0;}
  body{
    background: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(232,162,61,0.06), transparent 60%), var(--void);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    overflow:hidden;
  }
  .scanlines{
    position:absolute; inset:0;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, transparent 1px, transparent 3px);
    pointer-events:none;
  }

  .app{
    width:100%;
    max-width: 460px;
    height:100%;
    max-height: 860px;
    display:flex;
    flex-direction:column;
  }

  .readout{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 18px 20px 12px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--dim);
    text-transform:uppercase;
  }
  .readout .dot{
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background: var(--amber); margin-right:6px; box-shadow:0 0 6px var(--amber);
    animation: blink 2.4s ease-in-out infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  h1{
    font-family:'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 600;
    margin: 0 20px 14px;
  }

  .log{
    flex:1;
    overflow-y:auto;
    padding: 4px 20px;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }
  .empty{
    margin:auto;
    text-align:center;
    color: var(--dim);
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    max-width: 220px;
    line-height: 1.6;
  }

  .bubble{
    max-width: 82%;
    padding: 9px 13px;
    border-radius: 10px;
    font-size: 13.5px;
    line-height:1.4;
  }
  .bubble .t{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size: 9.5px;
    letter-spacing:0.5px;
    margin-top: 3px;
  }
  .bubble.visitor{
    align-self:flex-start;
    background: #1a222c;
    border: 1px solid var(--panel-edge);
    border-bottom-left-radius: 3px;
  }
  .bubble.visitor .t{ color: var(--dim); }
  .bubble.me{
    align-self:flex-end;
    background: var(--amber);
    color: #1c1305;
    border-bottom-right-radius: 3px;
  }
  .bubble.me .t{ color: rgba(0,0,0,0.4); }
  .bubble.ring{
    align-self:center;
    background: var(--cyan-dim);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    text-align:center;
    padding: 7px 14px;
  }

  .composer{
    display:flex;
    gap: 8px;
    padding: 14px 16px;
    border-top: 1px solid var(--panel-edge);
    flex-shrink:0;
  }
  .composer input{
    flex:1;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 10px;
    padding: 12px 13px;
    color: var(--text);
    font-family:'IBM Plex Sans', sans-serif;
    font-size: 14px;
    outline:none;
  }
  .composer input:focus{ border-color: var(--amber); }
  .composer button{
    width: 44px;
    border-radius: 10px;
    border: 1px solid var(--amber-dim);
    background: var(--amber);
    color: #1c1305;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .composer button svg{ width:18px; height:18px; }

  .log::-webkit-scrollbar{ width:4px; }
  .log::-webkit-scrollbar-thumb{ background: var(--panel-edge); border-radius:2px; }
</style>
</head>
<body>

<div class="scanlines"></div>
<div class="app">
  <div class="readout">
    <span><span class="dot"></span>CONSOLA // EN LÍNEA</span>
    <span id="clock">--:--</span>
  </div>
  <h1>Puerta principal</h1>
  <div class="log" id="log">
    <div class="empty" id="emptyMsg">Sin actividad todavía.<br>Aquí aparecerá quien toque el timbre.</div>
  </div>
  <div class="composer">
    <input type="text" id="msgInput" placeholder="Responder..." maxlength="200">
    <button id="sendBtn" aria-label="Enviar">
      <svg viewBox="0 0 24 24" fill="#1c1305"><path d="M3 20V4L22 12L3 20ZM5 17L15.85 12L5 7V10.5L11 12L5 13.5V17Z"/></svg>
    </button>
  </div>
</div>

<script>
  // ============================================================
  const TOPIC_FROM_VISITOR = "samperladulce-7f3k9";
  const TOPIC_TO_VISITOR   = "samperladulce-7f3k9-reply";
  // ============================================================

  const log        = document.getElementById('log');
  const emptyMsg    = document.getElementById('emptyMsg');
  const msgInput    = document.getElementById('msgInput');
  const sendBtn     = document.getElementById('sendBtn');
  const clock       = document.getElementById('clock');

  function tick(){ clock.textContent = new Date().toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'}); }
  tick(); setInterval(tick, 15000);

  function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function addBubble(text, cls, time){
    if(emptyMsg) emptyMsg.remove();
    const b = document.createElement('div');
    b.className = 'bubble ' + cls;
    if(cls === 'ring'){
      b.textContent = '🔔 ' + text;
    } else {
      b.innerHTML = escapeHtml(text) + '<span class="t">' + (time || nowStr()) + '</span>';
    }
    log.appendChild(b);
    log.scrollTop = log.scrollHeight;
  }
  function nowStr(){ return new Date().toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'}); }

  async function publish(topic, {title, message, tags}){
    const params = new URLSearchParams();
    if(title) params.set('title', title);
    if(tags) params.set('tags', tags);
    params.set('message', message);
    const resp = await fetch(`https://ntfy.sh/${topic}?${params.toString()}`, { method:'POST' });
    if(!resp.ok) throw new Error('send failed');
  }

  async function sendReply(){
    const text = msgInput.value.trim();
    if(!text) return;
    msgInput.value = '';
    addBubble(text, 'me');
    try {
      await publish(TOPIC_TO_VISITOR, { message: text, title: 'Respuesta' });
    } catch(err){
      addBubble('No se pudo enviar esta respuesta.', 'ring');
    }
  }
  sendBtn.addEventListener('click', sendReply);
  msgInput.addEventListener('keydown', e => { if(e.key === 'Enter') sendReply(); });

  // Escuchar timbre y mensajes del visitante en tiempo real
  function connectIncoming(){
    try {
      const es = new EventSource(`https://ntfy.sh/${TOPIC_FROM_VISITOR}/sse`);
      es.onmessage = (ev) => {
        try {
          const data = JSON.parse(ev.data);
          if(data.event === 'message' && data.message){
            const time = new Date(data.time*1000).toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
            if((data.tags || []).includes('bellhop_bell')){
              addBubble(data.message, 'ring', time);
            } else {
              addBubble(data.message, 'visitor', time);
            }
          }
        } catch(e){}
      };
    } catch(e){}
  }
  connectIncoming();
</script>

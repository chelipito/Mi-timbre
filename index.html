<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Timbre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --walnut: #2b2118;
    --walnut-deep: #1a140e;
    --brass: #b8863b;
    --brass-bright: #d9a54a;
    --porch-glow: #f3ca7a;
    --cream: #f6ecd9;
    --wood-grain: #3a2d20;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{height:100%; margin:0;}
  body{
    background:
      radial-gradient(ellipse 120% 80% at 50% -10%, rgba(243,202,122,0.18), transparent 60%),
      linear-gradient(160deg, var(--walnut) 0%, var(--walnut-deep) 100%);
    font-family: 'Work Sans', sans-serif;
    color: var(--cream);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }
  /* wood grain texture */
  body::before{
    content:"";
    position:absolute; inset:0;
    background-image: repeating-linear-gradient(
      90deg,
      rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 1px,
      transparent 1px, transparent 38px
    );
    opacity:0.5;
    pointer-events:none;
  }

  .plaque{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding: 36px 28px 44px;
    max-width: 380px;
    width: 90%;
  }

  .eyebrow{
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(246,236,217,0.55);
    margin-bottom: 6px;
  }

  h1{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(26px, 7vw, 34px);
    margin: 0 0 8px;
    color: var(--cream);
  }

  .sub{
    font-size: 15px;
    color: rgba(246,236,217,0.6);
    margin: 0 0 44px;
    max-width: 280px;
    line-height: 1.5;
  }

  .bell-wrap{
    position:relative;
    width: 168px;
    height: 168px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom: 40px;
  }

  .ring-wave{
    position:absolute;
    border-radius:50%;
    border: 1.5px solid rgba(217,165,74,0.5);
    opacity:0;
  }
  .ring-wave.active{
    animation: waveOut 1.1s ease-out;
  }
  @keyframes waveOut{
    0%{ width:110px; height:110px; opacity:0.8; }
    100%{ width:220px; height:220px; opacity:0; }
  }

  button.bell{
    position:relative;
    width: 116px;
    height: 116px;
    border-radius: 50%;
    border: none;
    cursor:pointer;
    background:
      radial-gradient(circle at 35% 30%, var(--brass-bright), var(--brass) 55%, #8a6023 100%);
    box-shadow:
      0 8px 20px rgba(0,0,0,0.45),
      inset 0 2px 3px rgba(255,255,255,0.35),
      inset 0 -6px 10px rgba(0,0,0,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform 0.08s ease;
  }
  button.bell:active{
    transform: scale(0.94);
    box-shadow:
      0 4px 10px rgba(0,0,0,0.4),
      inset 0 2px 4px rgba(0,0,0,0.4);
  }
  button.bell:disabled{
    opacity:0.55;
    cursor:default;
  }

  .bell-icon{
    width: 46px;
    height: 46px;
    fill: var(--walnut-deep);
  }

  .status{
    font-size: 14px;
    min-height: 20px;
    color: rgba(246,236,217,0.75);
    transition: color 0.3s ease;
  }
  .status.success{
    color: var(--porch-glow);
    font-weight: 500;
  }

  .footer-note{
    position:absolute;
    bottom: 22px;
    font-size: 11px;
    letter-spacing: 1px;
    color: rgba(246,236,217,0.3);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="plaque">
  <div class="eyebrow">Residencia</div>
  <h1>Alguien está en la puerta</h1>
  <p class="sub">Presiona el botón para avisar que estás afuera. Un momento, ya te atienden.</p>

  <div class="bell-wrap">
    <div class="ring-wave" id="wave1"></div>
    <div class="ring-wave" id="wave2"></div>
    <button class="bell" id="bellBtn" aria-label="Tocar el timbre">
      <svg class="bell-icon" viewBox="0 0 24 24">
        <path d="M12 2C10.9 2 10 2.9 10 4V4.29C7.13 5.14 5 7.82 5 11V16L3 18V19H21V18L19 16V11C19 7.82 16.87 5.14 14 4.29V4C14 2.9 13.1 2 12 2ZM12 22C13.1 22 14 21.1 14 20H10C10 21.1 10.9 22 12 22Z"/>
      </svg>
    </button>
  </div>

  <div class="status" id="statusText">Toca para llamar</div>
</div>

<div class="footer-note">Timbre digital</div>

<script>
  // ============================================================
  // CONFIGURA AQUÍ tu canal secreto de ntfy (ver instrucciones)
  // Cámbialo por algo único y difícil de adivinar.
  const NTFY_TOPIC = "samperladulce-7f3k9";
  // ============================================================

  const btn = document.getElementById('bellBtn');
  const statusText = document.getElementById('statusText');
  const wave1 = document.getElementById('wave1');
  const wave2 = document.getElementById('wave2');

  let cooldown = false;

  btn.addEventListener('click', async () => {
    if (cooldown) return;
    cooldown = true;
    btn.disabled = true;

    wave1.classList.remove('active');
    wave2.classList.remove('active');
    void wave1.offsetWidth; // reinicia animación
    wave1.classList.add('active');
    setTimeout(() => wave2.classList.add('active'), 180);

    statusText.textContent = "Llamando...";
    statusText.classList.remove('success');

    try {
      const now = new Date().toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
      const params = new URLSearchParams({
        title: 'Tocan el timbre',
        priority: 'urgent',
        tags: 'bellhop_bell',
        message: `Alguien está en la puerta - ${now}`
      });
      const resp = await fetch(`https://ntfy.sh/${NTFY_TOPIC}?${params.toString()}`, {
        method: 'POST'
      });
      if (!resp.ok) throw new Error('fallo el envio');
      statusText.textContent = "Listo, ya avisamos que estás aquí";
      statusText.classList.add('success');
    } catch (err) {
      statusText.textContent = "No se pudo enviar. Intenta de nuevo.";
    }

    setTimeout(() => {
      btn.disabled = false;
      cooldown = false;
      if (statusText.classList.contains('success')) {
        statusText.textContent = "Toca para llamar de nuevo";
        statusText.classList.remove('success');
      }
    }, 25000);
  });
</script>

</body>
</html>
